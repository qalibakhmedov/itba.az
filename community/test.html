<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Karyera testi — itba.az</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens-spec.css">
<link rel="stylesheet" href="/css/community-spec.css">
</head>
<body>
<div class="page wide">
  <a href="/index.html" class="site-brand">← itba.az</a>
  <p class="mini-link" style="margin:-10px 0 16px"><a href="dashboard.html">← Dashboard</a></p>
  <div style="text-align:center;margin-bottom:8px">
    <span class="badge">Karyera uyğunluq testi</span>
    <h1>IT Biznes Analitikası sizə nə qədər uyğundur?</h1>
    <p class="subhead" style="margin:0 auto 20px">Səmimi cavablandırın — səhv cavab yoxdur, yalnız bugünkü vəziyyətinizin daha aydın mənzərəsi.</p>
  </div>
  <div class="card" id="loadingCard">
    <p class="subhead">Suallar yüklənir…</p>
  </div>
  <div class="card" id="quizCard" style="display:none">
    <div class="progress" id="progressLine">0 / 0 cavablandırılıb</div>
    <div id="questionsBox"></div>
    <button class="btn btn-primary" id="submitBtn" disabled>Davam etmək üçün bütün sualları cavablandırın</button>
    <div class="err" id="errBox" style="display:none" role="alert"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
let attemptId = null;
let questions = [];
let answers = {};

function escHtml(s) { return esc(s); }

function render() {
  const box = document.getElementById("questionsBox");
  box.innerHTML = questions.map((q, qi) => {
    const opts = q.options.map((opt, oi) => {
      const checked = answers[q.id] === oi ? " selected" : "";
      const isChecked = answers[q.id] === oi ? " checked" : "";
      return '<label class="option' + checked + '">' +
        '<input type="radio" name="q-' + q.id + '" value="' + oi + '"' + isChecked + '>' +
        '<span>' + escHtml(opt.text) + '</span></label>';
    }).join("");
    return '<div style="margin-bottom:28px">' +
      '<h2 style="font-size:16.5px">' + (qi + 1) + '. ' + escHtml(q.question_text) + '</h2>' +
      '<div class="option-list" data-qid="' + q.id + '">' + opts + '</div>' +
      '</div>';
  }).join("");

  box.querySelectorAll(".option-list").forEach((list) => {
    const qid = Number(list.dataset.qid);
    list.querySelectorAll('input[type="radio"]').forEach((input) => {
      input.addEventListener("change", () => {
        answers[qid] = Number(input.value);
        render();
        updateProgress();
      });
    });
  });
}

function updateProgress() {
  const answeredCount = Object.keys(answers).length;
  document.getElementById("progressLine").textContent = answeredCount + " / " + questions.length + " cavablandırılıb";
  const btn = document.getElementById("submitBtn");
  const allAnswered = answeredCount === questions.length;
  btn.disabled = !allAnswered;
  btn.textContent = allAnswered ? "Nəticəmi gör" : "Davam etmək üçün bütün " + questions.length + " sualı cavablandırın";
}

async function init() {
  const session = await requireSession();
  if (!session) return;
  trackVisit("community-test");
  const userId = session.user.id;

  const { data: qs, error: qErr } = await sbAuth
    .from("test_questions")
    .select("id, category, question_text, options, order_index")
    .eq("active", true)
    .order("order_index");

  if (qErr || !qs || qs.length === 0) {
    document.getElementById("loadingCard").innerHTML =
      '<h1>Test əlçatan deyil</h1>' +
      '<p class="subhead">Karyera testi hazırda yüklənə bilmədi. Bir az sonra yenidən cəhd edin.</p>' +
      '<div class="btn-row"><button class="btn btn-primary" id="retryInitBtn">Yenidən cəhd et</button>' +
      '<a href="dashboard.html" class="btn btn-ghost">Dashboard-a qayıt</a></div>';
    document.getElementById("retryInitBtn").addEventListener("click", init);
    return;
  }
  questions = qs;

  const { data: existing } = await sbAuth
    .from("test_attempts")
    .select("id, answers")
    .eq("user_id", userId)
    .is("completed_at", null)
    .order("started_at", { ascending: false })
    .limit(1)
    .maybeSingle();

  if (existing) {
    attemptId = existing.id;
    answers = existing.answers || {};
  } else {
    const { data: created, error: createErr } = await sbAuth
      .from("test_attempts")
      .insert({ user_id: userId })
      .select("id")
      .single();
    if (createErr || !created) {
      document.getElementById("loadingCard").innerHTML =
        '<h1>Test başladıla bilmədi</h1><p class="subhead">Bir az sonra yenidən cəhd edin.</p>' +
        '<div class="btn-row"><button class="btn btn-primary" id="retryInitBtn2">Yenidən cəhd et</button>' +
        '<a href="dashboard.html" class="btn btn-ghost">Dashboard-a qayıt</a></div>';
      document.getElementById("retryInitBtn2").addEventListener("click", init);
      return;
    }
    attemptId = created.id;
  }

  document.getElementById("loadingCard").style.display = "none";
  document.getElementById("quizCard").style.display = "block";
  render();
  updateProgress();
}

document.getElementById("submitBtn").addEventListener("click", async () => {
  const btn = document.getElementById("submitBtn");
  const errBox = document.getElementById("errBox");
  errBox.style.display = "none";
  btn.disabled = true; btn.textContent = "Qiymətləndirilir…";

  const { error: updateError } = await sbAuth
    .from("test_attempts")
    .update({ answers })
    .eq("id", attemptId);

  if (updateError) {
    btn.disabled = false; updateProgress();
    errBox.textContent = "Cavablarınız saxlanmadı. Yenidən cəhd edin.";
    errBox.style.display = "block";
    return;
  }

  const { error: scoreError } = await sbAuth.rpc("score_test_attempt", { p_attempt_id: attemptId });

  if (scoreError) {
    btn.disabled = false; updateProgress();
    errBox.textContent = "Testiniz qiymətləndirilmədi. Yenidən cəhd edin.";
    errBox.style.display = "block";
    return;
  }

  location.href = "test-results.html?attempt=" + attemptId;
});

init();
</script>
</body>
</html>
