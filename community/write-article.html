<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Məqalə yaz — itba.az</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens-spec.css">
<link rel="stylesheet" href="/css/community-spec.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/trix@2/dist/trix.css">
</head>
<body>
<div class="page wide">
  <a href="/index.html" class="site-brand">← itba.az</a>
  <p class="mini-link" style="margin:-10px 0 16px"><a href="dashboard.html">← Dashboard</a> · <a href="my-articles.html">Məqalələrim</a></p>
  <div class="card" id="loadingCard">
    <p class="subhead">Yüklənir…</p>
  </div>
  <div class="card" id="notAllowedCard" style="display:none">
    <h1 id="notAllowedTitle"></h1>
    <p class="subhead" id="notAllowedText" style="margin:0 0 16px"></p>
    <a href="dashboard.html" class="btn btn-ghost">Dashboard-a qayıt</a>
  </div>
  <div class="card" id="formCard" style="display:none">
    <h1 id="formTitle">Məqalə yaz</h1>
    <p class="subhead">Təqdim edənə qədər qaralama kimi saxlanılır — admin təsdiqləməyənə qədər heç kim görmür.</p>
    <form id="articleForm">
      <div class="field">
        <label for="title">Başlıq <span class="required">*</span></label>
        <input id="title" type="text" required>
      </div>
      <div class="field">
        <label for="dek">Qısa xülasə (opsional)</label>
        <textarea id="dek" placeholder="Məqalə siyahısında görünəcək bir-iki cümlə" style="min-height:60px"></textarea>
      </div>
      <div class="field">
        <label for="category">Kateqoriya <span class="required">*</span></label>
        <select id="category" required>
          <option value="ai">AI</option>
          <option value="tools">IT BA Alətləri</option>
          <option value="case_studies">Praktik Nümunələr / Real Hadisələr</option>
          <option value="news">Sahə Xəbərləri</option>
        </select>
      </div>
      <div class="field">
        <label for="tags">Teqlər (vergüllə ayrılmış, opsional)</label>
        <input id="tags" type="text" placeholder="məs. tələblər, agile, bankçılıq">
      </div>
      <div class="field">
        <label for="coverImageUrl">Üz şəkli URL-i (opsional)</label>
        <input id="coverImageUrl" type="url" placeholder="https://…">
      </div>
      <div class="field">
        <label for="bodyInput">Məzmun <span class="required">*</span></label>
        <input id="bodyInput" type="hidden">
        <trix-editor input="bodyInput" aria-label="Məqalə məzmunu"></trix-editor>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-ghost" id="saveDraftBtn">Qaralama saxla</button>
        <button type="button" class="btn btn-primary" id="submitReviewBtn">Təsdiqə göndər</button>
      </div>
      <div class="err" id="errBox" style="display:none" role="alert"></div>
      <div class="notice" id="okBox" style="display:none" aria-live="polite"></div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/trix@2/dist/trix.umd.min.js"></script>
<script>
let articleId = null;
let userId = null;

function slugify(title) {
  return title
    .toLowerCase()
    .replace(/[^\p{L}\p{N}]+/gu, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80) || "article";
}

function computeReadingTime(html) {
  const text = html.replace(/<[^>]*>/g, " ");
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 200));
}

async function ensureUniqueSlug(base, excludeId) {
  let slug = base;
  let suffix = 2;
  for (;;) {
    let query = sbAuth.from("articles").select("id").eq("slug", slug).limit(1);
    if (excludeId) query = query.neq("id", excludeId);
    const { data } = await query;
    if (!data || data.length === 0) return slug;
    slug = base + "-" + suffix;
    suffix++;
  }
}

async function init() {
  const session = await requireSession();
  if (!session) return;
  trackVisit("community-write-article");
  userId = session.user.id;

  const { data: profile } = await sbAuth
    .from("profiles")
    .select("role, verified")
    .eq("id", userId)
    .maybeSingle();

  if (!profile) {
    document.getElementById("notAllowedTitle").textContent = "Hesabınız üçün əlçatan deyil";
    document.getElementById("notAllowedText").textContent = "Məqalə yazmaq yalnız təsdiqlənmiş IT BA professional hesablar üçün mövcuddur.";
    document.getElementById("loadingCard").style.display = "none";
    document.getElementById("notAllowedCard").style.display = "block";
    return;
  }
  if (profile.role !== "professional") {
    document.getElementById("notAllowedTitle").textContent = "Hesabınız üçün əlçatan deyil";
    document.getElementById("notAllowedText").textContent = "Məqalə yazmaq yalnız təsdiqlənmiş IT BA professional hesablar üçün mövcuddur.";
    document.getElementById("loadingCard").style.display = "none";
    document.getElementById("notAllowedCard").style.display = "block";
    return;
  }
  const me = mapLegacyRole(profile.role, profile.verified);
  if (caps(me).publish !== "review") {
    document.getElementById("notAllowedTitle").textContent = "Hesabınız təsdiq gözləyir";
    document.getElementById("notAllowedText").textContent = "Admin peşəkar profilinizi təsdiqləməlidir. Təsdiqləndikdən sonra yaza biləcəksiniz — tezliklə yoxlayın.";
    document.getElementById("loadingCard").style.display = "none";
    document.getElementById("notAllowedCard").style.display = "block";
    return;
  }

  const idParam = new URLSearchParams(location.search).get("id");
  if (idParam) {
    articleId = Number(idParam);
    const { data: article, error } = await sbAuth
      .from("articles")
      .select("*")
      .eq("id", articleId)
      .maybeSingle();
    if (error || !article) {
      location.href = "my-articles.html";
      return;
    }
    document.getElementById("formTitle").textContent = "Məqaləni redaktə et";
    document.getElementById("title").value = article.title;
    document.getElementById("dek").value = article.dek || "";
    document.getElementById("category").value = article.category;
    document.getElementById("tags").value = (article.tags || []).join(", ");
    document.getElementById("coverImageUrl").value = article.cover_image_url || "";
    // Defense in depth: sanitize again before loading into the editor,
    // in case this row was ever written by something other than this
    // form (e.g. a direct API call) rather than trusting it's already clean.
    document.getElementById("bodyInput").value = DOMPurify.sanitize(article.body_html || "");
  }

  document.getElementById("loadingCard").style.display = "none";
  document.getElementById("formCard").style.display = "block";
}

async function saveArticle(status) {
  const errBox = document.getElementById("errBox");
  const okBox = document.getElementById("okBox");
  errBox.style.display = "none";
  okBox.style.display = "none";

  const title = document.getElementById("title").value.trim();
  const dek = document.getElementById("dek").value.trim();
  const category = document.getElementById("category").value;
  const tags = document.getElementById("tags").value.split(",").map((t) => t.trim()).filter(Boolean);
  const coverImageUrl = document.getElementById("coverImageUrl").value.trim();
  const bodyHtml = DOMPurify.sanitize(document.getElementById("bodyInput").value);

  if (!title || !bodyHtml) {
    errBox.textContent = "Başlıq və məzmun tələb olunur.";
    errBox.style.display = "block";
    return;
  }

  const readingTime = computeReadingTime(bodyHtml);
  const payload = {
    title,
    dek,
    category,
    tags,
    cover_image_url: coverImageUrl || null,
    body_html: bodyHtml,
    reading_time_minutes: readingTime,
    status,
  };

  try {
    if (articleId) {
      const { error } = await sbAuth.from("articles").update(payload).eq("id", articleId);
      if (error) throw error;
    } else {
      payload.author_id = userId;
      payload.slug = await ensureUniqueSlug(slugify(title), null);
      const { data, error } = await sbAuth.from("articles").insert(payload).select("id").single();
      if (error) throw error;
      articleId = data.id;
    }
    okBox.textContent = status === "draft" ? "Qaralama kimi saxlanıldı." : "Admin təsdiqinə göndərildi.";
    okBox.style.display = "block";
  } catch (err) {
    errBox.textContent = (err && err.message) || "Məqalə saxlanmadı. Yenidən cəhd edin.";
    errBox.style.display = "block";
  }
}

document.getElementById("articleForm").addEventListener("submit", (e) => {
  e.preventDefault();
  saveArticle("draft");
});
document.getElementById("submitReviewBtn").addEventListener("click", () => saveArticle("pending_review"));

init();
</script>
</body>
</html>
