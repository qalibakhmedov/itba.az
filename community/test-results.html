<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Nəticəniz — itba.az</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens-spec.css">
<link rel="stylesheet" href="/css/community-spec.css">
</head>
<body>
<div class="page">
  <a href="/index.html" class="site-brand">← itba.az</a>
  <div class="card" id="loadingCard">
    <p class="subhead">Nəticəniz yüklənir…</p>
  </div>
  <div class="card" id="resultCard" style="display:none">
    <div class="score-hero">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-band" id="scoreBand"></div>
    </div>
    <p class="subhead" id="bandText"></p>
    <div class="category-bars" id="categoryBars"></div>
    <a href="dashboard.html" class="btn btn-primary">Dashboard-a keç</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
const BAND_COPY = {
  early: {
    label: "İlkin araşdırma",
    text: "Bu yolun lap əvvəlindəsiniz və bu tamamilə normaldır — uğurlu BA-ların çoxu məhz buradan başlayıb. Əvvəlcə əsaslara fokuslanın: tələblərin necə toplandığı və proseslərin necə sənədləşdirildiyi — konkret alətlər barədə narahat olmadan.",
  },
  promising: {
    label: "Perspektivli uyğunluq",
    text: "Bu işin əsasına artıq real bacarıq göstərirsiniz — iş üçün hazır bacarığa çevirmək üçün sadəcə struktur və məşq lazımdır. Aşağıdakı zəif kateqoriyanıza yönəlmiş bələdçili proqram boşluğu ən sürətli bağlayar.",
  },
  strong: {
    label: "Güclü uyğunluq",
    text: "IT Biznes Analitikasının gündəlik tələb etdiyi ilə güclü təbii uyğunluq göstərirsiniz. Əsaslardan başlamaq əvəzinə müsahibəyə hazırlığa sürətli keçid üçün yaxşı namizədsiniz.",
  },
};
const CATEGORY_LABEL = {
  analytical: "Analitik düşüncə",
  communication: "Maraqlı tərəflərlə ünsiyyət",
  tooling: "Alət bilikləri",
};

(async () => {
  const session = await requireSession();
  if (!session) return;
  trackVisit("community-test-results");

  const attemptId = Number(new URLSearchParams(location.search).get("attempt"));
  if (!attemptId) { location.href = "dashboard.html"; return; }

  const { data: attempt } = await sbAuth
    .from("test_attempts")
    .select("overall_score, category_scores, report_band, completed_at")
    .eq("id", attemptId)
    .maybeSingle();

  if (!attempt || !attempt.completed_at || attempt.overall_score == null || !attempt.report_band) {
    location.href = "test.html";
    return;
  }

  const band = BAND_COPY[attempt.report_band];
  document.getElementById("scoreNum").textContent = attempt.overall_score;
  document.getElementById("scoreBand").textContent = band.label;
  document.getElementById("bandText").textContent = band.text;

  const scores = attempt.category_scores;
  document.getElementById("categoryBars").innerHTML = Object.keys(scores).map((cat) => {
    return '<div class="category-bar">' +
      '<div class="label"><span>' + esc(CATEGORY_LABEL[cat] || cat) + '</span><span>' + scores[cat] + '</span></div>' +
      '<div class="track"><div class="fill" style="width:' + scores[cat] + '%"></div></div>' +
      '</div>';
  }).join("");

  document.getElementById("loadingCard").style.display = "none";
  document.getElementById("resultCard").style.display = "block";
})();
</script>
</body>
</html>
