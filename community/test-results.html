<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Your results — itba.az</title>
<link rel="stylesheet" href="/css/community.css">
</head>
<body>
<canvas id="particle-bg" aria-hidden="true"></canvas>
<div class="page">
  <div class="container">
    <a href="/index.html" class="site-brand">← itba.az</a>
    <div class="card" id="loadingCard">
      <p class="subhead" style="margin:0">Loading your result…</p>
    </div>
    <div class="card" id="resultCard" style="display:none">
      <div class="score-hero">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-band" id="scoreBand"></div>
      </div>
      <p style="font-size:14.5px;color:var(--muted)" id="bandText"></p>
      <div class="category-bars" id="categoryBars"></div>
      <a href="dashboard.html" class="btn btn-primary">Go to dashboard</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
const BAND_COPY = {
  early: {
    label: "Early exploration",
    text: "You're at the very beginning of this path, and that's completely fine — most successful BAs started exactly here. Focus first on the fundamentals: how requirements are gathered and how processes are documented, before worrying about specific tools.",
  },
  promising: {
    label: "Promising fit",
    text: "You already show real aptitude for the core of this work — you just need structure and practice to turn it into job-ready skill. A guided program focused on your weaker category below would close the gap fastest.",
  },
  strong: {
    label: "Strong fit",
    text: "You show strong natural alignment with what IT Business Analysis actually demands day to day. You're a good candidate to fast-track toward interview-readiness rather than starting from the basics.",
  },
};
const CATEGORY_LABEL = {
  analytical: "Analytical thinking",
  communication: "Stakeholder communication",
  tooling: "Tooling familiarity",
};

(async () => {
  const session = await requireSession();
  if (!session) return;
  trackVisit("community-test-results");

  const attemptId = Number(new URLSearchParams(location.search).get("attempt"));
  if (!attemptId) { location.href = "dashboard.html"; return; }

  const { data: attempt } = await sbAuth
    .from("test_attempts")
    .select("overall_score, category_scores, report_band, completed_at")
    .eq("id", attemptId)
    .maybeSingle();

  if (!attempt || !attempt.completed_at || attempt.overall_score == null || !attempt.report_band) {
    location.href = "test.html";
    return;
  }

  const band = BAND_COPY[attempt.report_band];
  document.getElementById("scoreNum").textContent = attempt.overall_score;
  document.getElementById("scoreBand").textContent = band.label;
  document.getElementById("bandText").textContent = band.text;

  const scores = attempt.category_scores;
  document.getElementById("categoryBars").innerHTML = Object.keys(scores).map((cat) => {
    return '<div class="category-bar">' +
      '<div class="label"><span>' + esc(CATEGORY_LABEL[cat] || cat) + '</span><span>' + scores[cat] + '</span></div>' +
      '<div class="track"><div class="fill" style="width:' + scores[cat] + '%"></div></div>' +
      '</div>';
  }).join("");

  document.getElementById("loadingCard").style.display = "none";
  document.getElementById("resultCard").style.display = "block";
})();
</script>
<script src="/js/particle-bg.js"></script>
</body>
</html>
