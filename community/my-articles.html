<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Məqalələrim — itba.az</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens-spec.css">
<link rel="stylesheet" href="/css/community-spec.css">
</head>
<body>
<div class="page wide">
  <a href="/index.html" class="site-brand">← itba.az</a>
  <p class="mini-link" style="margin:-10px 0 16px"><a href="dashboard.html">← Dashboard</a></p>
  <div class="card" id="loadingCard">
    <p class="subhead">Yüklənir…</p>
  </div>
  <div class="card" id="mainCard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <h1 style="margin:0">Məqalələrim</h1>
      <a href="write-article.html" class="btn btn-primary">Yeni məqalə yaz</a>
    </div>
    <div id="articleList" style="margin-top:18px"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
const STATUS_LABEL = {
  draft: "Draft",
  pending_review: "Gözləyir",
  published: "Dərc olunub",
  rejected: "Rədd edilib",
};
const STATUS_ST = { draft: "", pending_review: "warn", published: "ok", rejected: "bad" };

async function loadArticles() {
  const session = await requireSession();
  if (!session) return;
  trackVisit("community-my-articles");

  const { data: articles, error } = await sbAuth
    .from("articles")
    .select("id, title, status, category, rejection_note, updated_at")
    .eq("author_id", session.user.id)
    .order("updated_at", { ascending: false });

  const list = document.getElementById("articleList");
  if (error) {
    list.innerHTML = '<div class="err" role="alert">Məqalələriniz yüklənmədi. İnternet bağlantınızı yoxlayın. ' +
      '<span class="retry-link" id="retryLoadArticles">Yenidən cəhd edin</span></div>';
    document.getElementById("retryLoadArticles").addEventListener("click", loadArticles);
  } else if (!articles || articles.length === 0) {
    list.innerHTML = '<p class="subhead" role="status">Hələ heç nə yazmamısınız — yuxarıdakı "Yeni məqalə yaz" düyməsi ilə başlayın.</p>';
  } else {
    list.innerHTML = articles.map((a) => {
      const date = new Date(a.updated_at).toLocaleDateString();
      const note = a.status === "rejected" && a.rejection_note
        ? '<br>Rəy: ' + esc(a.rejection_note)
        : "";
      return '<div class="row">' +
        '<div>' +
          '<b>' + esc(a.title) + '</b>' +
          '<small>Yeniləndi ' + date + note + '</small>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<span class="st ' + STATUS_ST[a.status] + '">' + STATUS_LABEL[a.status] + '</span>' +
          '<a href="write-article.html?id=' + a.id + '" class="mini-link">Redaktə et</a>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  document.getElementById("loadingCard").style.display = "none";
  document.getElementById("mainCard").style.display = "block";
}
loadArticles();
</script>
</body>
</html>
