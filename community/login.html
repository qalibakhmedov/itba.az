<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Giriş — itba.az</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens-spec.css">
<link rel="stylesheet" href="/css/community-spec.css">
</head>
<body>
<div class="page">
  <a href="/index.html" class="site-brand">← itba.az</a>
  <div class="card">
    <h1>Giriş</h1>
    <p class="subhead">itba.az icmasına xoş gəlmisiniz.</p>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Şifrə</label>
        <input id="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Giriş</button>
      <div class="err" id="errBox" style="display:none" role="alert"></div>
    </form>
    <p class="mini-link">Hesabınız yoxdur? <a href="register.html">Qeydiyyatdan keçin</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
trackVisit("community-login");

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errBox = document.getElementById("errBox");
  const btn = document.getElementById("submitBtn");
  errBox.style.display = "none";
  btn.disabled = true; btn.textContent = "Giriş edilir…";

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const { error } = await sbAuth.auth.signInWithPassword({ email, password });

  btn.disabled = false; btn.textContent = "Giriş";
  if (error) {
    errBox.textContent = error.code === "email_not_confirmed"
      ? "Əvvəlcə emailinizi təsdiqləyin — poçt qutunuzdakı təsdiq linkinə baxın."
      : "Email və ya şifrə yanlışdır.";
    errBox.style.display = "block";
    return;
  }

  const params = new URLSearchParams(location.search);
  location.href = params.get("next") || "dashboard.html";
});
</script>
</body>
</html>
