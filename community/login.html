<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — itba.az</title>
<link rel="stylesheet" href="/css/community.css">
</head>
<body>
<canvas id="particle-bg" aria-hidden="true"></canvas>
<div class="page">
  <div class="container">
    <div class="card">
      <h1 style="font-size:26px">Log in</h1>
      <p class="subhead">Welcome back to the itba.az community.</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Log in</button>
        <div class="err" id="errBox" style="display:none"></div>
      </form>
      <div class="mini-link">Don't have an account? <a href="register.html">Register</a></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/site-common.js"></script>
<script src="/js/community-common.js"></script>
<script>
trackVisit("community-login");

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errBox = document.getElementById("errBox");
  const btn = document.getElementById("submitBtn");
  errBox.style.display = "none";
  btn.disabled = true; btn.textContent = "Logging in…";

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const { error } = await sbAuth.auth.signInWithPassword({ email, password });

  btn.disabled = false; btn.textContent = "Log in";
  if (error) {
    errBox.textContent = error.code === "email_not_confirmed"
      ? "Please confirm your email first — check your inbox for the confirmation link."
      : "Incorrect email or password.";
    errBox.style.display = "block";
    return;
  }

  const params = new URLSearchParams(location.search);
  location.href = params.get("next") || "dashboard.html";
});
</script>
<script src="/js/particle-bg.js"></script>
</body>
</html>
