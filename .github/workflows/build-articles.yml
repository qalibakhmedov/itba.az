name: Build article pages

# Regenerates articles/*, sitemap.xml from Supabase's published articles.
# No live server is involved anywhere else in this site — this is the
# only place code runs; the output is plain committed HTML that GitHub
# Pages serves as-is. See README for the full pipeline.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build:articles

      - name: Commit and push if changed
        run: |
          git config user.name "itba-az-bot"
          git config user.email "actions@users.noreply.github.com"
          git add articles/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No article content changes."
          else
            git commit -m "Rebuild article pages [skip ci]"
            git push
          fi
